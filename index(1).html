<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PH DANH</title>
<style>
body{margin:0;font-family:Arial;background:url('cat.jpg') center/cover fixed;height:100vh;display:flex;align-items:center;justify-content:center}
body:before{content:'';position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(5px)}
.card{position:relative;z-index:1;width:340px;background:rgba(255,255,255,.12);backdrop-filter:blur(12px);border-radius:22px;padding:25px;color:#fff;text-align:center;box-shadow:0 0 20px #00e5ff;animation:glow 5s infinite}
@keyframes glow{0%{box-shadow:0 0 20px #0ff}50%{box-shadow:0 0 20px #f0f}100%{box-shadow:0 0 20px #0ff}}
img{width:120px;height:120px;border-radius:50%;border:4px solid #0ff;object-fit:cover}
a,button{display:block;margin:12px auto;padding:12px;border-radius:12px;background:#00bcd4;color:#fff;text-decoration:none;border:none;width:80%}
canvas{position:fixed;inset:0}
</style></head><body>
<canvas id='cv'></canvas>
<div class='card'>
<img src='cat.jpg'>
<h2>PH DANH</h2>
<p>Discord: mewtongtaimew</p>
<p>TikTok: @thedrrrkkkk765</p>
<div id='clock'></div>
<a target='_blank' href='https://www.tiktok.com/@thedrrrkkkk765'>TikTok</a>
<button onclick="navigator.clipboard.writeText('mewtongtaimew');alert('Đã copy Discord')">Copy Discord</button>
<audio id='m' loop><source src='music.mp3' type='audio/mpeg'></audio>
<button onclick='m.paused?m.play():m.pause()'>🎵 Bật/Tắt nhạc</button>
</div>
<script>
setInterval(()=>clock.textContent=new Date().toLocaleString('vi-VN'),1000);
let c=cv,x=c.getContext('2d');function r(){c.width=innerWidth;c.height=innerHeight}onresize=r;r();
let p=[...Array(60)].map(()=>({x:Math.random()*c.width,y:Math.random()*c.height,v:1+Math.random()*2}));
(function f(){x.clearRect(0,0,c.width,c.height);x.fillStyle='rgba(255,255,255,.7)';p.forEach(o=>{o.y+=o.v;if(o.y>c.height)o.y=0;x.beginPath();x.arc(o.x,o.y,2,0,6.28);x.fill()});requestAnimationFrame(f)})();
</script></body></html>
